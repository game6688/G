<!DOCTYPE html><html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowWork X</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{--g1:#00f5ff;--g2:#00ffa6}
*{box-sizing:border-box}body{ margin:0; font-family:'Kanit',sans-serif; color:#e5faff; height:100vh;

background: linear-gradient(270deg,#020617,#0f172a,#1e293b,#0f172a,#020617); background-size:800% 800%; animation:bgMove 10s ease infinite; overflow:hidden; }

/* animated glow layer */ body::before{ content:''; position:fixed; width:200%; height:200%; top:-50%; left:-50%; background: radial-gradient(circle, rgba(0,255,200,0.08), transparent 60%); animation: rotateBG 25s linear infinite; pointer-events:none; }

@keyframes rotateBG{ from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

@keyframes bgMove{ 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

.container{max-width:100%;padding:16px}

.card{ background:rgba(255,255,255,.06); backdrop-filter:blur(20px); border-radius:20px; padding:16px; margin-bottom:12px; transform-style:preserve-3d; transition:transform 0.2s ease; box-shadow:0 20px 40px rgba(0,0,0,0.6); }

.counter{ font-size:64px; text-align:center; background:linear-gradient(90deg,var(--g1),var(--g2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent }

.money{text-align:center}

button{ width:100%; padding:16px; border:none; border-radius:16px; font-size:18px; margin-top:8px; color:white; }

.add{background:linear-gradient(45deg,#00c853,#00ff95)} .sub{background:linear-gradient(45deg,#d50000,#ff4d4d)}

.history{max-height:220px;overflow:auto}

.item{ padding:10px; margin-bottom:6px; background:rgba(255,255,255,.05); border-radius:10px } </style>

</head>
<body>
<div class="container">
  <div class="card">
    <div class="counter" id="count">0</div>
    <div class="money" id="money">0 บาท</div>
  </div>  <div class="card">
    <input id="note" placeholder="หมายเหตุ" style="width:100%;padding:10px;border-radius:10px;border:none">
    <button class="add" id="addBtn">+1</button>
    <button class="sub" onclick="sub()">-1</button>
  </div>  <div class="card">
    <div class="history" id="history"></div>
  </div>
</div><script>
let count = parseInt(localStorage.getItem('count')) || 0;
let history = JSON.parse(localStorage.getItem('history')) || [];

const countEl = document.getElementById('count');
const moneyEl = document.getElementById('money');
const historyEl = document.getElementById('history');
const noteEl = document.getElementById('note');
const addBtn = document.getElementById('addBtn');

function save(){
  localStorage.setItem('count', count);
  localStorage.setItem('history', JSON.stringify(history));
}

function render(){
  countEl.innerText = count;
  moneyEl.innerText = (count*100)+' บาท';

  historyEl.innerHTML = history.slice().reverse().map(h=>
    `<div class="item">${h.type} • ${h.note}<br><small>${h.time}</small></div>`
  ).join('');
}

function getTime(){
  return new Date().toLocaleString('th-TH');
}

addBtn.addEventListener('click', add);

function add(){
  const note = noteEl.value || '-';
  count++;
  history.push({type:'+1', note, time:getTime()});
  noteEl.value='';
  save();
  render();
  explode();
}

function sub(){
  const note = noteEl.value || '-';
  count--;
  history.push({type:'-1', note, time:getTime()});
  noteEl.value='';
  save();
  render();
}

function explode(){
  const rect = addBtn.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;

  for(let i=0;i<10;i++){
    const p = document.createElement('div');
    p.style.position='fixed';
    p.style.width='4px';
    p.style.height='4px';
    p.style.background='#00ffd5';
    p.style.left=cx+'px';
    p.style.top=cy+'px';
    p.style.borderRadius='50%';
    document.body.appendChild(p);

    const angle = Math.random()*2*Math.PI;
    const dist = 50 + Math.random()*50;

    p.animate([
      {transform:'translate(0,0)',opacity:1},
      {transform:`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px)`,opacity:0}
    ],{duration:600});

    setTimeout(()=>p.remove(),600);
  }
}

// floating UI
setInterval(()=>{
  document.querySelectorAll('.card').forEach((el,i)=>{
    el.style.transform = `translateY(${Math.sin(Date.now()/600+i)*3}px)`;
  });
},50);

render();
</script></body>
</html>
